name = "wedding-photos"
main = "src/index.ts"
compatibility_date = "2026-06-19"

[[d1_databases]]
binding = "DB"
database_name = "wedding_photos"
database_id = "replace-with-cloudflare-d1-database-id"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "wedding-photos"

[vars]
EVENT_CODE = "WEDDING"
SESSION_SECRET = "change-this-before-deploy"
